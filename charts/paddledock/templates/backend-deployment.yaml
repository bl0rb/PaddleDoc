{{- if .Values.backend.enabled }}
{{- if not .Values.database.useExternal }}
{{- fail "database.useExternal must be true. This chart supports only external PostgreSQL." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paddledock.fullname" . }}-backend
  labels:
    {{- include "paddledock.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "paddledock.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "paddledock.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "paddledock.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "database.passwordSecret.name is required" .Values.database.passwordSecret.name }}
                  key: {{ required "database.passwordSecret.key is required" .Values.database.passwordSecret.key }}
            - name: DATABASE_URL
              value: postgresql+psycopg://{{ required "database.user is required" .Values.database.user }}:$(DATABASE_PASSWORD)@{{ required "database.host is required" .Values.database.host }}:{{ .Values.database.port }}/{{ required "database.database is required" .Values.database.database }}
            - name: DATABASE_SCHEMA
              value: {{ .Values.database.schema | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "paddledock.fullname" . }}-env
                  key: REDIS_URL
            - name: CORS_ORIGINS
              value: {{ .Values.backend.corsOrigins | quote }}
            - name: RUN_ALEMBIC_ON_STARTUP
              value: {{ .Values.backend.runAlembicOnStartup | quote }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: shared-storage
              mountPath: /app/backend/storage
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-storage" (include "paddledock.fullname" .)) .Values.persistence.existingClaim }}
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
