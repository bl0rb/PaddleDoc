{{- if .Values.worker.enabled }}
{{- if not .Values.database.useExternal }}
{{- fail "database.useExternal must be true. This chart supports only external PostgreSQL." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paddledock.fullname" . }}-worker
  labels:
    {{- include "paddledock.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "paddledock.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "paddledock.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "paddledock.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "database.passwordSecret.name is required" .Values.database.passwordSecret.name }}
                  key: {{ required "database.passwordSecret.key is required" .Values.database.passwordSecret.key }}
            - name: DATABASE_URL
              value: postgresql+psycopg://{{ required "database.user is required" .Values.database.user }}:$(DATABASE_PASSWORD)@{{ required "database.host is required" .Values.database.host }}:{{ .Values.database.port }}/{{ required "database.database is required" .Values.database.database }}
            - name: DATABASE_SCHEMA
              value: {{ .Values.database.schema | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "paddledock.fullname" . }}-env
                  key: REDIS_URL
            - name: PADDLE_DEFAULT_PROFILE
              value: {{ .Values.worker.paddleDefaultProfile | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: shared-storage
              mountPath: /app/backend/storage
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-storage" (include "paddledock.fullname" .)) .Values.persistence.existingClaim }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
