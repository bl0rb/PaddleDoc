nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

global:
  podAnnotations: {}
  podLabels: {}

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/bl0rb/paddledock-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  apiUrl: http://localhost:8000
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/bl0rb/paddledock-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  corsOrigins: '["http://localhost:3000"]'
  runAlembicOnStartup: true
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/bl0rb/paddledock-worker
    tag: "latest"
    pullPolicy: IfNotPresent
  paddleDefaultProfile: ppocrv6_tiny
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

migrationJob:
  enabled: false
  backoffLimit: 2

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  size: 20Gi
  existingClaim: ""

database:
  type: postgresdb
  useExternal: true
  host: ""
  port: 5432
  database: paddledock
  schema: public
  user: paddledock
  passwordSecret:
    name: ""
    key: password

redis:
  enabled: true
  image:
    repository: redis
    tag: "7"
    pullPolicy: IfNotPresent
  host: ""
  port: 6379
  resources: {}

autoscaling:
  backend:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  worker:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75

ingress:
  frontend:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: paddledock.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  backend:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: api.paddledock.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
