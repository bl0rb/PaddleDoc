name: paddledock

services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+psycopg://postgres@postgres:5432/paddledock
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000"]'
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_API_BEARER_TOKEN: ${OPENAI_API_BEARER_TOKEN:-}
    volumes:
      - ./backend/storage:/app/backend/storage
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: worker.Dockerfile
    restart: unless-stopped
    mem_limit: ${WORKER_MEMORY_LIMIT:-3g}
    cpus: ${WORKER_CPUS:-2.0}
    environment:
      DATABASE_URL: postgresql+psycopg://postgres@postgres:5432/paddledock
      REDIS_URL: redis://redis:6379/0
      PADDLE_DEFAULT_PROFILE: ppocrv6_tiny
      # Runtime tuning for smaller ARM hosts to reduce model load spikes.
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-1}
      CELERY_PREFETCH_MULTIPLIER: ${CELERY_PREFETCH_MULTIPLIER:-1}
      CELERY_MAX_TASKS_PER_CHILD: ${CELERY_MAX_TASKS_PER_CHILD:-5}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      ONNXRUNTIME_INTRA_OP_NUM_THREADS: ${ONNXRUNTIME_INTRA_OP_NUM_THREADS:-1}
      ONNXRUNTIME_INTER_OP_NUM_THREADS: ${ONNXRUNTIME_INTER_OP_NUM_THREADS:-1}
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_API_BEARER_TOKEN: ${OPENAI_API_BEARER_TOKEN:-}
    volumes:
      - ./backend/storage:/app/backend/storage
    depends_on:
      - backend
      - redis

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: paddledock
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
